<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840">
  <defs>
    <style>
      /* Typography */
      .title { font: 700 20px/1.2 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 12px/1.25 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #64748B; }

      .agentText { font: 700 13px/1.2 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #F8FAFC; }
      .agentSub { font: 500 12px/1.25 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: rgba(248,250,252,0.92); }

      .small { font: 600 12px/1.2 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill: #64748B; }

      /* Executive arrows: softer + slightly thinner */
      .connector { stroke: #B6C2D1; stroke-width: 1.8; fill: none; }
      .connectorSoft { stroke: #C6CFDA; stroke-width: 1.8; fill: none; stroke-dasharray: 6 6; }
      .loop { stroke: #A7B3C4; stroke-width: 2.0; fill: none; }

      /* Icons */
      .iconStroke { stroke: rgba(248,250,252,0.95); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconStrokeDark { stroke: #475569; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>

    <!-- Subtle drop shadow for enterprise polish -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <!-- Professional gradients (muted, enterprise) -->
    <linearGradient id="g-surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>

    <linearGradient id="g-primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#0F2A5F"/>
    </linearGradient>

    <linearGradient id="g-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>

    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>

    <linearGradient id="g-agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B3A5B"/>
      <stop offset="1" stop-color="#062B45"/>
    </linearGradient>

    <linearGradient id="g-integration" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2F7"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Smaller executive arrowheads -->
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#B6C2D1"/>
    </marker>
    <marker id="arrowSoft" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#C6CFDA"/>
    </marker>
    <marker id="arrowLoop" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#A7B3C4"/>
    </marker>

    <!-- Icons (simple line icons) -->
    <symbol id="ic-user" viewBox="0 0 24 24">
      <path class="iconStroke" d="M20 21a8 8 0 0 0-16 0"/>
      <circle class="iconStroke" cx="12" cy="8" r="4"/>
    </symbol>

    <symbol id="ic-magic" viewBox="0 0 24 24">
      <path class="iconStroke" d="M4 20l10-10"/>
      <path class="iconStroke" d="M13 3l8 8"/>
      <path class="iconStroke" d="M12 4l2 2"/>
      <path class="iconStroke" d="M9 7l2 2"/>
      <path class="iconStroke" d="M16 1l1 3"/>
      <path class="iconStroke" d="M21 6l-3-1"/>
    </symbol>

    <symbol id="ic-box" viewBox="0 0 24 24">
      <path class="iconStroke" d="M21 7l-9 5-9-5 9-5 9 5z"/>
      <path class="iconStroke" d="M3 7v10l9 5 9-5V7"/>
      <path class="iconStroke" d="M12 12v10"/>
    </symbol>

    <symbol id="ic-people" viewBox="0 0 24 24">
      <circle class="iconStroke" cx="9" cy="9" r="3"/>
      <circle class="iconStroke" cx="17" cy="10" r="2.5"/>
      <path class="iconStroke" d="M3.5 21a6 6 0 0 1 11 0"/>
      <path class="iconStroke" d="M14.5 21a5 5 0 0 1 7 0"/>
    </symbol>

    <symbol id="ic-calc" viewBox="0 0 24 24">
      <rect class="iconStroke" x="6" y="3" width="12" height="18" rx="2"/>
      <path class="iconStroke" d="M8 7h8"/>
      <path class="iconStroke" d="M9 11h2M13 11h2M9 14h2M13 14h2M9 17h6"/>
    </symbol>

    <symbol id="ic-contract" viewBox="0 0 24 24">
      <path class="iconStroke" d="M7 3h8l2 2v16H7z"/>
      <path class="iconStroke" d="M15 3v4h4"/>
      <path class="iconStroke" d="M9 10h6M9 13h6M9 16h4"/>
      <path class="iconStroke" d="M14.5 18.5l1.2 1.2 2.3-2.3"/>
    </symbol>

    <symbol id="ic-calendar" viewBox="0 0 24 24">
      <rect class="iconStroke" x="4" y="5" width="16" height="15" rx="2"/>
      <path class="iconStroke" d="M8 3v4M16 3v4M4 9h16"/>
      <path class="iconStroke" d="M8 13h3M8 16h3M13 13h3M13 16h3"/>
    </symbol>

    <symbol id="ic-handshake" viewBox="0 0 24 24">
      <path class="iconStroke" d="M8 12l2 2a2 2 0 0 0 3 0l4-4"/>
      <path class="iconStroke" d="M2 12l4-4 4 4-4 4-4-4z"/>
      <path class="iconStroke" d="M22 12l-4-4-3 3"/>
      <path class="iconStroke" d="M9 16l1 1a2 2 0 0 0 3 0l1-1"/>
    </symbol>

    <symbol id="ic-plug" viewBox="0 0 24 24">
      <path class="iconStrokeDark" d="M9 7v4M15 7v4"/>
      <path class="iconStrokeDark" d="M7 11h10v2a5 5 0 0 1-5 5h0a5 5 0 0 1-5-5v-2z"/>
      <path class="iconStrokeDark" d="M12 18v3"/>
    </symbol>
    <symbol id="ic-doc" viewBox="0 0 24 24">
      <path class="iconStrokeDark" d="M7 3h8l2 2v16H7z"/>
      <path class="iconStrokeDark" d="M15 3v4h4"/>
      <path class="iconStrokeDark" d="M9 11h6M9 14h6M9 17h4"/>
    </symbol>
    <symbol id="ic-dollar" viewBox="0 0 24 24">
      <path class="iconStrokeDark" d="M12 2v20"/>
      <path class="iconStrokeDark" d="M16 7.5c0-1.9-1.8-3.5-4-3.5s-4 1.6-4 3.5S9.8 11 12 11s4 1.6 4 3.5S14.2 18 12 18s-4-1.6-4-3.5"/>
    </symbol>
    <symbol id="ic-folder" viewBox="0 0 24 24">
      <path class="iconStrokeDark" d="M3 7h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <path class="iconStrokeDark" d="M3 7V5a2 2 0 0 1 2-2h5l2 2h8a2 2 0 0 1 2 2v2"/>
    </symbol>
  </defs>

  <rect width="1200" height="840" fill="#FFFFFF"/>

  <!-- Header (optimized margins) -->
  <text x="60" y="55" class="title">Field Service Management Platform — AI Agent Architecture</text>
  <text x="60" y="78" class="subtitle">Executive workflow view</text>

  <!-- Nodes -->
  <!-- User Input -->
  <rect x="470" y="130" width="260" height="55" rx="14" fill="url(#g-primary)" filter="url(#shadow)"/>
  <use href="#ic-user" x="488" y="146" width="22" height="22"/>
  <text x="610" y="162" text-anchor="middle" class="agentText">User Input</text>
  <text x="610" y="180" text-anchor="middle" class="agentSub">(Mobile App / Web App)</text>

  <!-- Orchestration Agent -->
  <rect x="450" y="250" width="300" height="65" rx="14" fill="url(#g-teal)" filter="url(#shadow)"/>
  <use href="#ic-magic" x="468" y="270" width="22" height="22"/>
  <text x="610" y="285" text-anchor="middle" class="agentText">Orchestration Agent</text>

  <!-- Material & Labour -->
  <rect x="250" y="420" width="240" height="60" rx="14" fill="url(#g-agent)" filter="url(#shadow)"/>
  <use href="#ic-box" x="268" y="438" width="22" height="22"/>
  <text x="390" y="455" text-anchor="middle" class="agentText">Material Agent</text>

  <rect x="710" y="420" width="240" height="60" rx="14" fill="url(#g-agent)" filter="url(#shadow)"/>
  <use href="#ic-people" x="728" y="438" width="22" height="22"/>
  <text x="850" y="455" text-anchor="middle" class="agentText">Labour Agent</text>

  <!-- Estimate -->
  <rect x="450" y="485" width="300" height="60" rx="14" fill="url(#g-blue)" filter="url(#shadow)"/>
  <use href="#ic-calc" x="468" y="503" width="22" height="22"/>
  <text x="610" y="520" text-anchor="middle" class="agentText">Estimate Agent</text>

  <!-- Contract -->
  <rect x="450" y="630" width="300" height="60" rx="14" fill="url(#g-primary)" filter="url(#shadow)"/>
  <use href="#ic-contract" x="468" y="648" width="22" height="22"/>
  <text x="610" y="665" text-anchor="middle" class="agentText">Contract Agent</text>

  <!-- Schedule -->
  <rect x="450" y="750" width="300" height="60" rx="14" fill="url(#g-primary)" filter="url(#shadow)"/>
  <use href="#ic-calendar" x="468" y="768" width="22" height="22"/>
  <text x="610" y="785" text-anchor="middle" class="agentText">Schedule Agent</text>

  <!-- Clients -->
  <rect x="860" y="630" width="210" height="60" rx="14" fill="#0F172A" opacity="0.92" filter="url(#shadow)"/>
  <use href="#ic-handshake" x="878" y="648" width="22" height="22"/>
  <text x="985" y="665" text-anchor="middle" class="agentText">Clients</text>

  <!-- Integrations -->
  <rect x="90" y="610" width="260" height="165" rx="14" fill="url(#g-surface)" stroke="#D7DEE8" stroke-width="1.2"/>
  <text x="110" y="640" class="small">Integrations (MCP Servers)</text>
  <use href="#ic-plug" x="295" y="625" width="18" height="18"/>

  <rect x="110" y="655" width="220" height="36" rx="10" fill="url(#g-integration)"/>
  <use href="#ic-doc" x="122" y="662" width="18" height="18"/>
  <text x="230" y="678" text-anchor="middle" class="small">Google Docs</text>

  <rect x="110" y="700" width="220" height="36" rx="10" fill="url(#g-integration)"/>
  <use href="#ic-dollar" x="122" y="707" width="18" height="18"/>
  <text x="230" y="723" text-anchor="middle" class="small">QuickBooks</text>

  <rect x="110" y="745" width="220" height="36" rx="10" fill="url(#g-integration)"/>
  <use href="#ic-folder" x="122" y="752" width="18" height="18"/>
  <text x="230" y="768" text-anchor="middle" class="small">Contract Management</text>

  <!-- Connectors -->
  <path d="M600 185 L600 250" class="connector" marker-end="url(#arrow)"/>

  <path d="M600 315 L600 480" class="connector" marker-end="url(#arrow)"/>
  <path d="M540 315 C540 360, 420 375, 370 420" class="connector" marker-end="url(#arrow)"/>
  <path d="M660 315 C660 360, 780 375, 830 420" class="connector" marker-end="url(#arrow)"/>

  <!-- Material & Labour -> Estimate -->
  <path d="M370 480 L370 515 L450 515" class="connector" marker-end="url(#arrow)"/>
  <path d="M830 480 L830 515 L750 515" class="connector" marker-end="url(#arrow)"/>

  <!-- Contract -> Schedule -->
  <path d="M600 690 L600 750" class="connector" marker-end="url(#arrow)"/>

  <!-- Contract -> Clients -->
  <path d="M750 660 L860 660" class="connector" marker-end="url(#arrow)"/>

  <!-- Integrations -> Contract (subtle dashed) -->
  <path d="M330 673 C390 673, 395 655, 450 655" class="connectorSoft" marker-end="url(#arrowSoft)"/>
  <path d="M330 718 C390 718, 395 665, 450 665" class="connectorSoft" marker-end="url(#arrowSoft)"/>
  <path d="M330 763 C390 763, 400 680, 450 675" class="connectorSoft" marker-end="url(#arrowSoft)"/>

  <!-- Loop arrows (Estimate <-> Contract) -->
  <path d="M750 515 C900 515, 900 660, 750 660" class="loop" marker-end="url(#arrowLoop)"/>
  <path d="M450 660 C300 660, 300 515, 450 515" class="loop" marker-end="url(#arrowLoop)"/>

  <!-- Loop labels -->
  <text x="285" y="600" class="small" text-anchor="start">Revise</text>
  <text x="915" y="600" class="small" text-anchor="end">Approved</text>
</svg>